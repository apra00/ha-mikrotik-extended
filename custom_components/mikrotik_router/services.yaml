send_magic_packet:
  name: Send magic packet (Wake-on-LAN)
  description: >
    Sends a Wake-on-LAN magic packet through the MikroTik router
    to wake up a device on the network.
  fields:
    mac:
      name: MAC address
      description: MAC address of the device to wake up.
      required: true
      example: "AA:BB:CC:DD:EE:FF"
      selector:
        text:
    interface:
      name: Interface
      description: >
        Router interface to send the magic packet from (e.g. bridge).
        Required by RouterOS — the packet is sent out through this interface.
      required: true
      example: "bridge"
      selector:
        text:

api_test:
  name: API Test
  description: >
    Query the RouterOS API directly or read processed coordinator data.
    Returns response data for diagnostics and debugging.
  fields:
    path:
      name: API Path
      description: >
        RouterOS API path to query (e.g. /interface, /ip/address, /system/resource).
        When coordinator_data is true, this is the coordinator data key instead.
      required: true
      example: "/interface"
      selector:
        text:
    limit:
      name: Limit
      description: Maximum number of items to return (1-500).
      required: false
      default: 10
      selector:
        number:
          min: 1
          max: 500
    host:
      name: Host Filter
      description: >
        Only query this specific router host.
        If omitted, queries all configured routers.
      required: false
      example: "192.168.88.1"
      selector:
        text:
    coordinator_data:
      name: Coordinator Data
      description: >
        If true, reads processed coordinator data instead of making a raw API call.
        Useful for inspecting the integration's internal state.
      required: false
      default: false
      selector:
        boolean:

set_environment:
  name: Set Environment Variable
  description: >
    Create, update or remove a RouterOS script environment variable.
    Use action "add" to create a new variable, "set" to update an existing one,
    or "remove" to delete it.
  fields:
    name:
      name: Variable Name
      description: Name of the environment variable.
      required: true
      example: "myVar"
      selector:
        text:
    value:
      name: Value
      description: Value to set (required for "add" and "set" actions).
      required: false
      example: "hello"
      selector:
        text:
    action:
      name: Action
      description: "Action to perform: set (update existing), add (create new), or remove (delete)."
      required: false
      default: "set"
      selector:
        select:
          options:
            - "set"
            - "add"
            - "remove"
    host:
      name: Host Filter
      description: >
        Only target this specific router host.
        If omitted, targets all configured routers.
      required: false
      example: "192.168.88.1"
      selector:
        text:

refresh_data:
  name: Refresh Data
  description: >
    Force an immediate data refresh from the router, including all sensors,
    environment variables, and device trackers. Useful in automations when
    you need up-to-date values without waiting for the next poll cycle.
  fields:
    host:
      name: Host Filter
      description: >
        Only refresh this specific router host.
        If omitted, refreshes all configured routers.
      required: false
      example: "192.168.88.1"
      selector:
        text: